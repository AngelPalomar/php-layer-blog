version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile        # ← usa el Dockerfile en lugar de la imagen directa
    volumes:
      - ..:/var/www/html:cached
      - ./.apache.conf:/etc/apache2/sites-available/000-default.conf
    environment:
      - DB_HOST=db
      - DB_USER=ci_user
      - DB_PASS=ci_pass
      - DB_NAME=ci_db
    depends_on:
      - db
    ports:
      - "8080:80"
    command: apache2-foreground     # ← simple y directo

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: ci_db
      MYSQL_USER: ci_user
      MYSQL_PASSWORD: ci_pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_pass
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  mysql_data: